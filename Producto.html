<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Productos.css">
    <title>Filtrado de productos</title>
</head>
<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="todo.html">Tareas</a>
        <a href="api-demo.html">Pokédex</a>
    </nav>

    <h1>Productos</h1>

    <!-- 🔥 LAYOUT PRINCIPAL -->
    <div class="layout">

        <!-- 🧭 SIDEBAR -->
        <aside class="sidebar">

            <label>Buscar</label>
            <input type="text" id="inputBusqueda" placeholder="Nombre del producto">

            <div class="filtro-grupo">
                <label>Categoría</label>
                <select id="selectCategoria">
                    <option value="todas">Todas</option>
                    <option value="Perifericos">Perifericos</option>
                    <option value="Memorias">Memorias</option>
                    <option value="Procesadores">Procesadores</option>
                    <option value="Placa madre">Placa Madre</option>
                    <option value="Gabinetes">Gabinetes</option>
                </select>
            </div>

            <div class="filtro-grupo">
                <label>Precio Máximo: $<span id="valorPrecio">300</span></label>
                <input type="range" id="rangePrecio" min="0" max="300" value="300">
            </div>

            <div class="filtro-grupo">
                <label>
                    <input type="checkbox" id="checkStock"> Solo en stock
                </label>
            </div>

            <button class="btn-reset" id="btn-reset">Limpiar filtros</button>

        </aside>

        <!-- 🛒 PRODUCTOS -->
        <main id="contenedor"></main>

    </div>

    <script src="Productos.js"></script>

</body>
</html>
